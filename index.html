<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PistlePixel Launcher</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a1628;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #ffffff;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 8s ease-in-out infinite;
        }
        .orb-1 { width: 300px; height: 300px; background: rgba(255, 80, 40, 0.12); top: -100px; right: -80px; }
        .orb-2 { width: 250px; height: 250px; background: rgba(255, 140, 40, 0.10); bottom: -80px; left: -60px; animation-delay: -4s; }
        .orb-3 { width: 200px; height: 200px; background: rgba(255, 60, 30, 0.08); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -2s; }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
        }

        /* Language switch */
        .lang-switch {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px;
        }

        .lang-toggle {
            display: flex;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 30px;
            padding: 4px;
            gap: 2px;
        }

        .lang-option {
            padding: 8px 16px;
            border-radius: 26px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.4);
            font-family: inherit;
        }

        .lang-option.active {
            background: rgba(255,60,30,0.25);
            color: #ff8855;
            box-shadow: 0 2px 10px rgba(255,60,30,0.2);
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 45px 35px;
            text-align: center;
        }

        .title {
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #ff9966 50%, #ff5520 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 150, 80, 0.7);
            margin-bottom: 35px;
            font-weight: 500;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 60, 30, 0.1);
            border: 1px solid rgba(255, 80, 40, 0.25);
            color: #ff8855;
            font-size: 12px;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 50px;
            margin-bottom: 32px;
            letter-spacing: 1px;
        }

        .badge .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #ff5520;
            border-radius: 50%;
            margin-right: 8px;
            animation: dotPulse 2s infinite;
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 6px #ff5520; }
            50% { opacity: 0.3; box-shadow: 0 0 2px #ff5520; }
        }

        .buttons { display: flex; flex-direction: column; gap: 12px; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 24px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            background: transparent;
            color: #fff;
            font-family: inherit;
            width: 100%;
        }

        .btn-primary {
            background: rgba(255, 60, 30, 0.2);
            border-color: rgba(255, 80, 40, 0.4);
            color: #ff8855;
        }
        .btn-primary:hover { background: rgba(255, 60, 30, 0.3); border-color: rgba(255, 80, 40, 0.7); transform: translateY(-2px); box-shadow: 0 10px 40px rgba(255, 60, 30, 0.2); }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.08);
            color: rgba(255, 170, 110, 0.8);
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 255, 255, 0.15); transform: translateY(-2px); color: #ff9966; }

        .btn-icon { width: 18px; height: 18px; opacity: 0.7; flex-shrink: 0; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 80, 40, 0.3);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            max-width: 360px;
            width: 100%;
        }

        .modal-icon {
            width: 60px; height: 60px;
            background: rgba(255, 60, 30, 0.15);
            border: 1px solid rgba(255, 80, 40, 0.3);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; margin: 0 auto 20px;
        }
        .modal h2 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
        .modal p { color: rgba(255, 180, 140, 0.7); font-size: 14px; line-height: 1.6; margin-bottom: 25px; }
        .btn-modal {
            background: rgba(255, 60, 30, 0.25);
            border: 1px solid rgba(255, 80, 40, 0.5);
            color: #ff9966;
            padding: 12px 0; border-radius: 12px;
            font-size: 14px; font-weight: 600; cursor: pointer; width: 100%;
            font-family: inherit;
        }

        .footer { margin-top: 32px; font-size: 11px; color: rgba(255, 255, 255, 0.2); letter-spacing: 1px; }
        .footer a { color: rgba(255, 140, 80, 0.5); text-decoration: none; }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-icon">🚧</div>
            <h2 data-lang="modalTitle">Coming Soon</h2>
            <p data-lang="modalText">Downloads are not available yet.<br>Wait for the first release.</p>
            <button class="btn-modal" onclick="document.getElementById('modal').classList.remove('active')" data-lang="close">Close</button>
        </div>
    </div>

    <div class="container">
        <div class="lang-switch">
            <div class="lang-toggle">
                <button class="lang-option active" onclick="setLang('en')">EN</button>
                <button class="lang-option" onclick="setLang('ru')">RU</button>
            </div>
        </div>

        <div class="card">
            <h1 class="title">PistlePixel</h1>
            <p class="subtitle" data-lang="subtitle">Minecraft Launcher</p>
            <div class="badge"><span class="dot"></span><span data-lang="badge">First Release Soon</span></div>

            <div class="buttons">
                <button class="btn btn-primary" onclick="document.getElementById('modal').classList.add('active')">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 5h8v2H3V5zm0 4h8v2H3V9zm0 4h8v2H3v-2zm10-4h8v2h-8V9zm0 4h8v2h-8v-2zm0-8h8v2h-8V5z"/></svg>
                    <span data-lang="btn1">Download for Windows</span>
                </button>
                <button class="btn btn-secondary" onclick="document.getElementById('modal').classList.add('active')">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="2" width="20" height="20" rx="3" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                    <span data-lang="btn2">Download for Bedrock</span>
                </button>
                <button class="btn btn-secondary" onclick="document.getElementById('modal').classList.add('active')">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                    <span data-lang="btn3">Download for Linux</span>
                </button>
            </div>

            <p class="footer">PistlePixel &copy; 2026 &nbsp;|&nbsp; <a href="https://t.me/molygench">@molygench</a></p>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }

        const langs = {
            en: {
                subtitle: 'Minecraft Launcher',
                badge: 'First Release Soon',
                btn1: 'Download for Windows',
                btn2: 'Download for Bedrock',
                btn3: 'Download for Linux',
                modalTitle: 'Coming Soon',
                modalText: 'Downloads are not available yet.<br>Wait for the first release.',
                close: 'Close'
            },
            ru: {
                subtitle: 'Лаунчер Minecraft',
                badge: 'Скоро первый релиз',
                btn1: 'Скачать для Windows',
                btn2: 'Скачать для Bedrock',
                btn3: 'Скачать для Linux',
                modalTitle: 'Скоро',
                modalText: 'Загрузки пока недоступны.<br>Ожидайте первый релиз.',
                close: 'Закрыть'
            }
        };

        function setLang(lang) {
            document.querySelectorAll('.lang-option').forEach(b => b.classList.remove('active'));
            document.querySelector(`.lang-option[onclick="setLang('${lang}')"]`).classList.add('active');
            document.querySelectorAll('[data-lang]').forEach(el => {
                const key = el.getAttribute('data-lang');
                if (langs[lang][key]) el.innerHTML = langs[lang][key];
            });
        }
    </script>
</body>
</html>
