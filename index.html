<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PistlePixel Launcher</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #ffffff;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 8s ease-in-out infinite;
        }
        .orb-1 {
            width: 300px; height: 300px;
            background: rgba(255, 80, 40, 0.12);
            top: -100px; right: -80px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 250px; height: 250px;
            background: rgba(255, 140, 40, 0.10);
            bottom: -80px; left: -60px;
            animation-delay: -4s;
        }
        .orb-3 {
            width: 200px; height: 200px;
            background: rgba(255, 60, 30, 0.08);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -2s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 45px 35px;
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            position: relative;
        }

        .logo-inner {
            width: 100%;
            height: 100%;
            background: rgba(255, 60, 30, 0.15);
            border: 1.5px solid rgba(255, 70, 40, 0.4);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            position: relative;
            overflow: hidden;
        }

        .logo-inner::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255,80,40,0.3), transparent, rgba(255,120,50,0.2), transparent);
            animation: logoSpin 4s linear infinite;
        }

        @keyframes logoSpin {
            100% { transform: rotate(360deg); }
        }

        .logo-emoji {
            position: relative;
            z-index: 1;
        }

        .title {
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #ff9966 50%, #ff5520 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 150, 80, 0.7);
            margin-bottom: 35px;
            font-weight: 500;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 60, 30, 0.1);
            border: 1px solid rgba(255, 80, 40, 0.25);
            color: #ff8855;
            font-size: 12px;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 50px;
            margin-bottom: 32px;
            letter-spacing: 1px;
        }

        .badge .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #ff5520;
            border-radius: 50%;
            margin-right: 8px;
            animation: dotPulse 2s infinite;
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 6px #ff5520; }
            50% { opacity: 0.3; box-shadow: 0 0 2px #ff5520; }
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 24px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            background: transparent;
            color: #fff;
            font-family: inherit;
            width: 100%;
        }

        .btn-primary {
            background: rgba(255, 60, 30, 0.2);
            border-color: rgba(255, 80, 40, 0.4);
            color: #ff8855;
        }

        .btn-primary:hover {
            background: rgba(255, 60, 30, 0.3);
            border-color: rgba(255, 80, 40, 0.7);
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(255, 60, 30, 0.2);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover::before { left: 100%; }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.08);
            color: rgba(255, 170, 110, 0.8);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            color: #ff9966;
        }

        .btn-icon {
            width: 18px;
            height: 18px;
            opacity: 0.7;
            flex-shrink: 0;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 80, 40, 0.3);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            max-width: 360px;
            width: 100%;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 60, 30, 0.15);
            border: 1px solid rgba(255, 80, 40, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 20px;
        }

        .modal h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .modal p {
            color: rgba(255, 180, 140, 0.7);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn-modal {
            background: rgba(255, 60, 30, 0.25);
            border: 1px solid rgba(255, 80, 40, 0.5);
            color: #ff9966;
            padding: 12px 0;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-family: inherit;
            transition: all 0.3s;
        }

        .btn-modal:hover {
            background: rgba(255, 60, 30, 0.4);
            box-shadow: 0 8px 30px rgba(255, 60, 30, 0.2);
        }

        .footer {
            margin-top: 32px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
        }

        .footer a {
            color: rgba(255, 140, 80, 0.5);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover { color: #ff8855; }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-icon">🚧</div>
            <h2>Coming Soon</h2>
            <p>Downloads are not available yet.<br>Wait for the first release of PistlePixel Launcher.</p>
            <button class="btn-modal" onclick="document.getElementById('modal').classList.remove('active')">Close</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h1 class="title">PistlePixel</h1>
            <p class="subtitle">Minecraft Launcher</p>
            <div class="badge"><span class="dot"></span>First Release Soon</div>

            <div class="buttons">
                <button class="btn btn-primary" onclick="document.getElementById('modal').classList.add('active')">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 5h8v2H3V5zm0 4h8v2H3V9zm0 4h8v2H3v-2zm10-4h8v2h-8V9zm0 4h8v2h-8v-2zm0-8h8v2h-8V5z"/></svg>
                    Download for Windows
                </button>
                <button class="btn btn-secondary" onclick="document.getElementById('modal').classList.add('active')">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="2" width="20" height="20" rx="3" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                    Download for Bedrock
                </button>
                <button class="btn btn-secondary" onclick="document.getElementById('modal').classList.add('active')">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                    Download for Linux
                </button>
            </div>

            <p class="footer">PistlePixel &copy; 2026 &nbsp;|&nbsp; <a href="https://t.me/molygench">@molygench</a></p>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }
    </script>
</body>
</html>
