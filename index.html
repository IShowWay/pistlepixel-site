<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PistlePixel Launcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #0d2137 30%, #0f2b4a 60%, #0a1628 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(100, 180, 255, 0.15);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 560px;
            padding: 20px;
        }

        .card {
            background: rgba(15, 30, 55, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(80, 160, 255, 0.2);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5), 0 0 60px rgba(40, 120, 255, 0.1);
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1e90ff 0%, #00bfff 100%);
            border-radius: 22px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 10px 40px rgba(30, 144, 255, 0.4);
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: rgba(180, 210, 255, 0.7);
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 180, 50, 0.15);
            border: 1px solid rgba(255, 180, 50, 0.3);
            color: #ffb832;
            font-size: 13px;
            font-weight: 600;
            padding: 8px 18px;
            border-radius: 50px;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 28px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            letter-spacing: 0.3px;
            background: rgba(255, 255, 255, 0.03);
            color: rgba(150, 190, 230, 0.5);
            border-color: rgba(100, 170, 255, 0.1);
            position: relative;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(100, 170, 255, 0.2);
        }

        .btn .lock {
            font-size: 14px;
            opacity: 0.6;
        }

        .icon {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            opacity: 0.5;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #0f1e37;
            border: 1px solid rgba(80, 160, 255, 0.3);
            border-radius: 20px;
            padding: 40px 35px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
        }

        .modal-icon {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .modal h2 {
            color: #ffffff;
            font-size: 22px;
            margin-bottom: 12px;
        }

        .modal p {
            color: rgba(180, 210, 255, 0.7);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .modal .btn-close {
            background: linear-gradient(135deg, #1e90ff 0%, #0073e6 100%);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal .btn-close:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(30, 144, 255, 0.4);
        }

        .footer {
            margin-top: 35px;
            font-size: 12px;
            color: rgba(150, 190, 230, 0.4);
        }

        .footer a {
            color: rgba(150, 190, 230, 0.6);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: #80b4ff;
        }

        @media (max-width: 600px) {
            .card {
                padding: 35px 25px;
                border-radius: 20px;
            }
            .title {
                font-size: 26px;
            }
            .btn {
                padding: 14px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-icon">🚧</div>
            <h2>Coming Soon</h2>
            <p>Downloads are not available yet.<br>Wait for the first release of PistlePixel Launcher.</p>
            <button class="btn-close" onclick="closeModal()">OK</button>
        </div>
    </div>

    <!-- Main Card -->
    <div class="container">
        <div class="card">
            <div class="logo">🎮</div>
            <h1 class="title">PistlePixel</h1>
            <p class="subtitle">Minecraft Launcher</p>

            <div class="badge">First Release Soon</div>

            <div class="buttons">
                <a href="#" class="btn" onclick="showModal(event)">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 5h8v2H3V5zm0 4h8v2H3V9zm0 4h8v2H3v-2zm10-4h8v2h-8V9zm0 4h8v2h-8v-2zm0-8h8v2h-8V5z"/></svg>
                    Download for Windows
                    <span class="lock">🔒</span>
                </a>
                <a href="#" class="btn" onclick="showModal(event)">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="2" width="20" height="20" rx="3" fill="none" stroke="currentColor" stroke-width="2"/><text x="12" y="17" text-anchor="middle" fill="currentColor" font-size="10" font-weight="bold">BE</text></svg>
                    Download for Bedrock
                    <span class="lock">🔒</span>
                </a>
                <a href="#" class="btn" onclick="showModal(event)">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><text x="12" y="16" text-anchor="middle" fill="currentColor" font-size="10" font-weight="bold">TUX</text></svg>
                    Download for Linux
                    <span class="lock">🔒</span>
                </a>
            </div>

            <p class="footer">
                PistlePixel &copy; 2026 &nbsp;|&nbsp; 
                <a href="https://t.me/molygench" target="_blank">@molygench</a>
            </p>
        </div>
    </div>

    <script>
        for (let i = 0; i < 25; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const s = Math.random() * 4 + 1;
            p.style.width = s + 'px';
            p.style.height = s + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = Math.random() * 20 + 10 + 's';
            p.style.animationDelay = Math.random() * 15 + 's';
            document.getElementById('particles').appendChild(p);
        }

        function showModal(e) {
            e.preventDefault();
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
